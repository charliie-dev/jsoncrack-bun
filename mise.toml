[tools]
bun = "latest"

[tasks.dev]
description = "Start development server"
run = "bun run dev"

[tasks.build]
description = "Build all packages"
run = "bun run build"

[tasks.lint]
description = "Run linting"
run = "bun run lint"

[tasks."lint:fix"]
description = "Fix lint issues"
run = "bun run lint:fix"

[tasks.start]
description = "Start production server"
run = "bun run start"

[tasks.analyze]
description = "Build with bundle analyzer"
run = "bun run analyze"

[tasks.clean]
description = "Clean build outputs"
run = "bun run clean"

[tasks.install]
description = "Install dependencies"
run = "bun install"

[tasks."dc:validate"]
description = "Validate compose config"
run = '''
#!/usr/bin/env bash
set -euo pipefail
echo "Validating compose.yml..."
docker compose config --quiet
echo "Compose config OK"
'''

[tasks."dc:up"]
description = "Start services (pre-built image)"
run = '''
#!/usr/bin/env bash
set -euo pipefail
if [ ! -f .env ]; then
  cp .env.example .env
  echo "Created .env from .env.example"
fi
docker compose up -d
'''

[tasks."dc:rec"]
description = "Recreate all containers"
run = "docker compose up -d --force-recreate --remove-orphans"

[tasks."dc:down"]
description = "Stop and remove containers"
run = "docker compose down -v --remove-orphans"

[tasks."dc:status"]
description = "Show container status"
run = 'docker compose ps --format "table {{.Name}}\t{{.Status}}"'

[tasks."dc:logs"]
description = "Tail container logs"
run = "docker compose logs -f"

[tasks."dc:build:up"]
description = "Build from source and start"
run = "docker compose -f apps/www/compose.yml up -d --build"

[tasks."dc:build:rec"]
description = "Rebuild from source and recreate"
run = "docker compose -f apps/www/compose.yml up -d --build --force-recreate --remove-orphans"

[tasks."dc:build:down"]
description = "Stop source-built containers"
run = "docker compose -f apps/www/compose.yml down --remove-orphans"

[tasks."dc:prune"]
description = "Nuclear cleanup: containers, images"
run = '''
#!/usr/bin/env bash
set -euo pipefail
docker compose down -v --remove-orphans 2>/dev/null || true
docker compose down --rmi all 2>/dev/null || true
docker compose -f apps/www/compose.yml down -v --remove-orphans 2>/dev/null || true
docker compose -f apps/www/compose.yml down --rmi all 2>/dev/null || true
'''
